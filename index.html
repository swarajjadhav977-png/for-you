<!DOCTYPE html>
<html>
<head>
<meta property="og:title" content="A Special Surprise For you ❤️">
<meta property="og:description" content="Open this, I have something special for you 💌">
<meta property="og:image" content="https://i.pinimg.com/1200x/fc/1e/22/fc1e226718d4a3e0ffbd11077345da18.jpg">
<meta property="og:type" content="website">
    <title>A Special Surprise For You ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
    background-color: #ffe6eb;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

        button {
            width: 100px;
    height: 45px;
    font-size: 18px;
    cursor: pointer;
    border: none;
    border-radius: 50px;
        }

        #yesBtn {
            background-color: lightgreen;
            color: white;
        }

        #noBtn {
            background-color: red;
            color: white;
            position: absolute;
        }

        #message {
            margin-top: 20px;
            font-size: 24px;
            color: green;
        } 
        #gif {width: 250px;
               max-width: 80%;
               height: auto;}
        .heart{
              position: fixed;
    bottom: -50px;
    font-size: 30px;
    animation: float 4s linear forwards;
    pointer-events: none;
    z-index: 999;
}

@keyframes float {
    0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
    }

    50% {
        transform: translateY(-300px) scale(1.3) rotate(20deg);
        opacity: 0.8;
    }

    100% {
        transform: translateY(-700px) scale(0.8) rotate(-20deg);
        opacity: 0;
        }
       }        
    </style>
</head>

<body>

    <img id="gif" src="https://i.pinimg.com/736x/6f/0b/d1/6f0bd17b2ced31e6cb2f9c5b7b6b54ff.jpg">

    <h1>Will You Be My Girlfriend? 💖</h1>
    <div id="message">
        <button id="yesBtn" onclick="sayYes()">Yes ❤️</button>
        <button id="noBtn">No 😭</button>
    </div>
    <script>
        function sayYes() {
            document.getElementById("gif").src = "https://i.pinimg.com/736x/d6/ab/a6/d6aba617384f38bf314e594b9f710150.jpg";

            document.querySelector("h1").innerHTML =
                "Yay! I Love You Too ❤️😘";
                createHearts();

                function createHearts() {
                  for (let i = 0; i < 50; i++) {

                    let heart = document.createElement("div");
                    heart.className = "heart";
                    heart.innerHTML = "❤️";

                    heart.style.left = Math.random() * 100 + "vw";

                    heart.style.animationDuration = 
                    (Math.random() * 2+3) + "s";

                    heart.style.fontSize = 
                    (Math.random() * 20 + 20) + "px";

                    document.body.appendChild(heart);

                    setTimeout(() => {
                      heart.remove();
                    },5000);
                  }
                }
        }
        const noBtn = document.getElementById("noBtn");
        const gif = document.getElementById("gif");
        const gifs =[
    "https://media1.tenor.com/m/zGm5acSjHCIAAAAC/cat-begging.gif",
    "https://i.pinimg.com/736x/f5/8a/4a/f58a4aae922155f97ce6bfc3d42500f9.jpg",
    "https://i.pinimg.com/originals/3b/c4/6e/3bc46e8c8dfd0b62345e0a5ac4b41270.gif",
    "https://i.pinimg.com/originals/d7/f5/87/d7f587da442a54025daf47091fe26ba0.gif"
];
                        const messages =
                         ["Please? 🥺",
    "oh ok 😭",
    "Think again ❤️",
    "Don't break my heart 😭"
]

let index = 0;
function moveNoButton() {
    gif.src = gifs[index];
    document.querySelector("h1").innerHTML = messages[index];

    index = (index + 1) % gifs.length;

    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);

    noBtn.style.position = "absolute";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}noBtn.addEventListener("mouseover", moveNoButton);
        noBtn.addEventListener("click", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton);
    </script>

</body>
</html>
